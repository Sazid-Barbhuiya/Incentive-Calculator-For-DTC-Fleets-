<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>


<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

.header { background:#e60000; color:white; text-align:center; padding:18px; }
.main-title { font-family:Poppins; font-size:24px; font-weight:600; }

.container { max-width:700px; margin:10px auto; background:white; padding:20px; border-radius:10px; }

input,select{
width:100%; padding:10px; margin-bottom:12px;
border-radius:6px; border:1px solid #ccc; font-size:16px;
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

button{
width:100%;padding:12px;background:#e60000;
color:white;border:none;border-radius:6px;font-size:16px;
}

#message{text-align:center;color:red;font-weight:bold;}

.result-box{background:#fff2f2;padding:10px;margin-top:10px;}

.highlight{text-align:center;color:#e60000;font-size:20px;font-weight:bold;}

#slabUsed{padding:5px 10px;border-radius:20px;color:white;}

table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;}
th{background:#e60000;color:white;}

@media(max-width:600px){
.grid{grid-template-columns:1fr;}
}

.popup{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);justify-content:center;align-items:center;
}
.popup-box{
background:white;padding:20px;border-radius:10px;text-align:center;
width:90%;max-width:300px;
}
</style>
</head>

<body>

<div class="header">
<div class="main-title">Incentive Calculator</div>
<div class="sub-title">Know Your Earnings</div>
</div>

<div class="container">

<label>Name</label>
<input id="username">

<label>Role</label>
<select id="role" onchange="toggleOC(); loadInputs();">
<option value="AF">AF</option>
<option value="OC">OC</option>
</select>

<label>Mode</label>
<select id="mode" onchange="toggleAON()">
<option value="FTD">FTD</option>
<option value="MTD">MTD</option>
</select>

<div id="aonSection">
<label>AON</label>
<select id="aon">
<option value="lte3">≤ 3 Months</option>
<option value="gt3">> 3 Months</option>
</select>
</div>

<div id="ocFields" style="display:none;">
<label>L2A %</label>
<input id="l2a" type="number">

<label>Lead Count</label>
<input id="leads" type="number">
</div>

<label>Total Lines</label>
<input id="manualTotal" type="number">

<h3>Enter Lines</h3>
<div id="inputs" class="grid"></div>

<button onclick="calculate()">Calculate</button>

<div id="message"></div>

<div id="downloadArea">
<div class="result-box">Name: <span id="displayName">-</span></div>
<div class="result-box">Total Lines: <span id="total">0</span></div>
<div class="result-box">Level: <span id="slabUsed">-</span></div>
<div class="result-box highlight">₹ <span id="incentive">0</span></div>

<table>
<thead>
<tr><th>Line</th><th>Count</th><th>Rate</th><th>Estimated Amount</th></tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<button onclick="downloadImage()">Download Report</button>

</div>

<div id="popup" class="popup">
<div class="popup-box">
<p>I know you are not sazid 😏, because he is the one who created me</p>
<button onclick="popup.style.display='none'">Opps, Sorry!!</button>
</div>
</div>

<script>

// ✅ FINAL DATA
const rolesData = {

AF:{
Standalone:[30,60,90],
"Add On":[30,60,90],
APB:[7.5,15,22.5],
MNP:[90,180,270],
Family:[150,300,450],
EMI:[150,300,450],
"Wi-Fi 499":[125,250,375],
"Wi-Fi 599+":[200,400,600],
"Wi-Fi 899+":[300,600,900],
"COCP NC":[10,10,10],
"COCP P2P":[10,10,10],
"COCP MNP":[20,20,20],
OAP:[100,100,100],
DTH:[100,100,100]
},

OC:{
Standalone:[30,60,90],
"Add On":[30,60,90],
APB:[7.5,15,22.5],
MNP:[90,180,270],
Family:[150,300,450],
EMI:[0,0,0],
"Wi-Fi 499":[125,250,375],
"Wi-Fi 599+":[200,400,600],
"Wi-Fi 899+":[300,600,900],
"COCP NC":[0,0,0],
"COCP P2P":[0,0,0],
"COCP MNP":[0,0,0],
OAP:[100,100,100],
DTH:[0,0,0]
}

};

function toggleAON(){
aonSection.style.display = mode.value==="FTD" ? "none":"block";
}

function toggleOC(){
ocFields.style.display = role.value==="OC" ? "block":"none";
}

function loadInputs(){
let r = role.value;
let data = rolesData[r];

inputs.innerHTML="";
for(let key in data){
inputs.innerHTML+=`
<div>
<label>${key}</label>
<input type="number" id="${key}" value="0">
</div>`;
}
}

function calculate(){

message.innerText="";
tableBody.innerHTML="";

let name=username.value.trim();
let roleVal=role.value;
let totalLines=Number(manualTotal.value)||0;

// ✅ popup
if(name.toLowerCase()==="sazid"){
popup.style.display="flex";
return;
}

if(!name){
message.innerText="Enter name";
return;
}

let level=0;

/* ✅ AF */
if(roleVal==="AF"){

if(mode.value==="MTD" && aon.value==="gt3" && totalLines<80){
message.innerText="Below 80 lines – no incentive";
return;
}

if(totalLines<=109) level=0;
else if(totalLines<=134) level=1;
else level=2;

}

/* ✅ OC */
else{

let l2aVal=Number(document.getElementById("l2a").value)||0;
let leadsVal=Number(document.getElementById("leads").value)||0;

// CASE 1
if(mode.value==="FTD" || (mode.value==="MTD" && aon.value==="lte3")){

if(l2aVal<=17) level=0;
else if(l2aVal<=23) level=1;
else level=2;

}

// CASE 2
else{

if(totalLines<40){
message.innerText="Lines < 40 → no incentive";
return;
}

if(leadsVal<250){
message.innerText="Leads < 250 → no incentive";
return;
}

if(l2aVal<=11){
message.innerText="L2A < 12% → no incentive";
return;
}
else if(l2aVal<=17) level=0;
else if(l2aVal<=23) level=1;
else level=2;

}

}

/* ✅ CALC */

let data = rolesData[roleVal];
let totalAmount=0;

for(let key in data){

let count=Number(document.getElementById(key).value)||0;
let rate=data[key][level];
let amount=count*rate;

totalAmount+=amount;

tableBody.innerHTML+=`
<tr>
<td>${key}</td>
<td>${count}</td>
<td>${rate}</td>
<td>${amount}</td>
</tr>`;
}

displayName.innerText=name;
total.innerText=totalLines;

let colors=["green","orange","red"];
let texts=["Level 1","Level 2","Level 3"];

slabUsed.innerText=texts[level];
slabUsed.style.background=colors[level];

incentive.innerText=Math.round(totalAmount);
}

function downloadImage(){
html2canvas(downloadArea).then(canvas=>{
let link=document.createElement("a");
link.href=canvas.toDataURL();
link.download="report.jpg";
link.click();
});
}

loadInputs();
toggleAON();
toggleOC();

</script>

</body>
</html>
